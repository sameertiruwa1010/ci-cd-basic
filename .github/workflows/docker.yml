name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'build_docker_image/**'

jobs:
  docker:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: build_docker_image

    steps:
      # 1️⃣ Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build Docker image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-docker-app:latest .

      # 4️⃣ Push Docker image to Docker Hub
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-docker-app:latest
